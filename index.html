<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTHÉTIQUE | Modern Essentials</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #000000;
            --accent: #6366f1;
            --bg: #ffffff;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
            --card-bg: #f8fafc; /* For summary and product areas */
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dark Mode Override */
        body.dark-mode {
            --primary: #ffffff;
            --bg: #0f172a;
            --text-muted: #94a3b8;
            --glass: rgba(15, 23, 42, 0.8);
            --card-bg: #1e293b;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { background: var(--bg); color: var(--primary); overflow-x: hidden; transition: var(--transition); }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; position: fixed; width: 100%; top: 0;
            background: var(--glass); backdrop-filter: blur(10px); z-index: 1000;
            border-bottom: 1px solid rgba(128,128,128,0.1);
        }

        .logo { font-size: 20px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }

        .nav-links { display: flex; align-items: center; }

        .nav-links a {
            text-decoration: none; color: var(--primary); margin: 0 20px;
            font-size: 14px; font-weight: 600; transition: var(--transition);
        }

        .nav-links a:hover { color: var(--accent); }

        /* Dark Mode Toggle Style */
        .theme-btn {
            background: none; border: none; cursor: pointer;
            font-size: 20px; color: var(--primary); margin-right: 20px;
            transition: var(--transition);
        }

        .cart-trigger { cursor: pointer; position: relative; font-size: 22px; }

        #cart-count {
            position: absolute; top: -5px; right: -10px;
            background: var(--accent); color: white; font-size: 10px;
            height: 18px; width: 18px; display: flex; align-items: center;
            justify-content: center; border-radius: 50%; font-weight: bold;
        }

        /* Hero Section */
        .hero {
            height: 90vh; background: var(--card-bg);
            display: flex; align-items: center; justify-content: center;
            text-align: center; flex-direction: column;
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center; color: white;
        }

        .hero h1 { font-size: clamp(40px, 8vw, 80px); font-weight: 800; line-height: 1; margin-bottom: 20px; }

        .btn-shop {
            padding: 18px 40px; background: white; color: black;
            border: none; border-radius: 50px; font-weight: 700;
            cursor: pointer; transition: var(--transition); text-transform: uppercase;
            font-size: 13px; letter-spacing: 1px;
        }

        .btn-shop:hover { background: var(--accent); color: white; transform: scale(1.05); }

        /* Section Title */
        .section-header { padding: 80px 8% 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .section-header h2 { font-size: 32px; font-weight: 800; }

        /* Product Grid */
        .shop-container { padding: 0 8% 80px; }
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .product-card { position: relative; overflow: hidden; }

        .img-container {
            width: 100%; height: 400px; border-radius: 12px; overflow: hidden;
            background: var(--card-bg); position: relative;
        }

        .img-container img {
            width: 100%; height: 100%; object-fit: cover;
            transition: var(--transition);
        }

        .product-card:hover .img-container img { transform: scale(1.1); }

        .add-btn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            width: 80%; padding: 12px; background: white; border: none; color: black;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: var(--transition); box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .product-card:hover .add-btn { transform: translateX(-50%) translateY(0); }

        .product-info { margin-top: 15px; }
        .product-info h3 { font-size: 16px; font-weight: 600; }
        .product-info p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

        /* Side Cart Sidebar */
        .sidebar {
            position: fixed; top: 0; right: -450px; width: 400px; height: 100vh;
            background: var(--bg); z-index: 2000; padding: 40px;
            box-shadow: -20px 0 50px rgba(0,0,0,0.1); transition: var(--transition);
            display: flex; flex-direction: column;
        }

        .sidebar.active { right: 0; }

        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 20px;
        }

        .cart-items { flex-grow: 1; overflow-y: auto; padding: 20px 0; }
        
        .cart-item {
            display: flex; gap: 15px; margin-bottom: 20px; align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }

        .cart-total-box { border-top: 1px solid rgba(128,128,128,0.2); padding-top: 20px; }
        .checkout-btn {
            width: 100%; padding: 18px; background: var(--primary);
            color: var(--bg); border: none; border-radius: 12px; font-weight: 700;
            margin-top: 15px; cursor: pointer;
        }

        /* Overlay */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px); display: none; z-index: 1500;
        }

        /* Checkout Page */
        .checkout-view {
            position: fixed; inset: 0; background: var(--bg); z-index: 3000;
            display: none; padding: 100px 10%; overflow-y: auto;
        }

        .checkout-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 80px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .input-group input {
            width: 100%; padding: 14px; border: 1.5px solid rgba(128,128,128,0.2);
            background: var(--card-bg); color: var(--primary);
            border-radius: 10px; font-size: 15px;
        }

        .summary-box { background: var(--card-bg); padding: 40px; border-radius: 20px; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; right: -100%; }
            .checkout-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeCart()"></div>

    <nav>
        <div class="logo">Esthétique</div>
        <div class="nav-links">
            <a href="#">Collections</a>
            <a href="#">Men</a>
            <a href="#">Women</a>
        </div>
        <div style="display: flex; align-items: center;">
            <button class="theme-btn" onclick="toggleTheme()" id="theme-icon">
                <i class="ri-moon-line"></i>
            </button>
            <div class="cart-trigger" onclick="openCart()">
                <i class="ri-shopping-cart-2-line"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>Essential <br> Minimalism.</h1>
        <button class="btn-shop" onclick="document.getElementById('shop').scrollIntoView()">Discover Shop</button>
    </header>

    <section id="shop">
        <div class="section-header">
            <div>
                <p style="color: var(--accent); font-weight: 700; font-size: 12px; letter-spacing: 2px;">NEW ARRIVALS</p>
                <h2>Seasonal Picks</h2>
            </div>
            <a href="#" style="color: var(--primary); font-weight: 600; font-size: 14px; text-decoration: none;">View All</a>
        </div>

        <div class="shop-container">
            <div class="product-grid" id="product-grid"></div>
        </div>
    </section>

    <div class="sidebar" id="cart-sidebar">
        <div class="sidebar-header">
            <h3>Your Bag</h3>
            <i class="ri-close-line" style="cursor:pointer; font-size: 24px;" onclick="closeCart()"></i>
        </div>
        <div class="cart-items" id="cart-items-list">
            <p style="text-align: center; color: #94a3b8; margin-top: 40px;">Your cart is empty.</p>
        </div>
        <div class="cart-total-box">
            <div style="display:flex; justify-content: space-between; font-weight: 800; font-size: 18px;">
                <span>Total</span>
                <span id="cart-total-price">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="openCheckout()">Continue to Checkout</button>
        </div>
    </div>

    <div class="checkout-view" id="checkout-view">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
            <h1 style="font-weight: 800;">Checkout</h1>
            <button onclick="closeCheckout()" style="border:none; background:none; cursor:pointer; font-weight: 700; color: var(--primary);">← Back</button>
        </div>
        
        <div class="checkout-grid">
            <div class="checkout-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="john@example.com">
                </div>
                <div class="input-group">
                    <label>Shipping Address</label>
                    <input type="text" placeholder="123 Street, City">
                </div>
                <button class="checkout-btn" style="background: var(--accent); color: white;">Place Order</button>
            </div>
            <div class="summary-box">
                <h3>Summary</h3>
                <div id="checkout-summary-list" style="margin-top: 20px;"></div>
                <hr style="margin: 20px 0; border: none; border-top: 1px solid rgba(128,128,128,0.2);">
                <div style="display:flex; justify-content: space-between; font-weight: 800;">
                    <span>Order Total</span>
                    <span id="summary-total-price">$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Premium Oversized Tee", price: 55, category: "Clothes", img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800" },
            { id: 2, name: "Desert Suede Boots", price: 180, category: "Shoes", img: "https://www.puntopigrostore.com/cdn/shop/products/DSC_8864_-_Copia.jpg?v=1697704723" },
            { id: 3, name: "Luxury Linen Shirt", price: 95, category: "Clothes", img: "https://images.unsplash.com/photo-1596755094514-f87e34085b2c?auto=format&fit=crop&w=800" },
            { id: 4, name: "Urban Tech Sneakers", price: 130, category: "Shoes", img: "https://images.unsplash.com/photo-1552346154-21d32810aba3?auto=format&fit=crop&w=800" },
            { id: 5, name: "Minimal Chinos", price: 75, category: "Clothes", img: "https://images.unsplash.com/photo-1473966968600-fa801b869a1a?auto=format&fit=crop&w=800" },
            { id: 6, name: "Classic Loafers", price: 210, category: "Shoes", img: "https://images.unsplash.com/photo-1614252235316-8c857d38b5f4?auto=format&fit=crop&w=800" },
            { id: 7, name: "Chelsea boot", price: 98, category: "Shoes", img: "https://pk.lamaretail.com/cdn/shop/files/MFW25BT012-BLACK-TITAN-LEATHER-BOOT-000000-_12.jpg?v=1764765460&width=1800" },
        ];

        let cart = [];

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#theme-icon i');
            if (document.body.classList.contains('dark-mode')) {
                icon.classList.replace('ri-moon-line', 'ri-sun-line');
            } else {
                icon.classList.replace('ri-sun-line', 'ri-moon-line');
            }
        }

        function initProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="img-container">
                        <img src="${p.img}" alt="${p.name}">
                        <button class="add-btn" onclick="addToCart(${p.id})">Add to Bag</button>
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>$${p.price}.00</p>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateUI();
            openCart();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            if(cart.length === 0) {
                list.innerHTML = `<p style="text-align: center; color: #94a3b8; margin-top: 40px;">Your cart is empty.</p>`;
            } else {
                list.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div>
                            <h4 style="font-size: 14px;">${item.name}</h4>
                            <p style="font-size: 12px; color: var(--text-muted);">$${item.price}.00</p>
                        </div>
                    </div>
                `).join('');
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total-price').innerText = `$${total}.00`;
            document.getElementById('summary-total-price').innerText = `$${total}.00`;
        }

        function openCart() {
            document.getElementById('cart-sidebar').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeCart() {
            document.getElementById('cart-sidebar').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        function openCheckout() {
            if(cart.length === 0) return alert("Your cart is empty!");
            document.getElementById('checkout-view').style.display = 'block';
            const summary = document.getElementById('checkout-summary-list');
            summary.innerHTML = cart.map(item => `
                <div style="display:flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px;">
                    <span>${item.name}</span>
                    <span>$${item.price}.00</span>
                </div>
            `).join('');
            closeCart();
        }

        function closeCheckout() {
            document.getElementById('checkout-view').style.display = 'none';
        }

        initProducts();
    </script>
</body>
</html>
